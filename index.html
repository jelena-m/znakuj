<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Znakuj i ti A1 — trening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f7f8; --card:#ffffff; --ink:#15212b; --muted:#5c6a74; --line:#e3e9ec; --soft:#eef2f4;
    --accent:#00b3d7; --accentd:#0098b8; --accent-soft:rgba(0,179,215,0.12);
    --ok:#1fa97f; --okd:#178a68; --mid:#e0922e; --midd:#c2791d; --no:#e0556f; --nod:#c43f59;
    --font:'Onest', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --shadow: 0 1px 2px rgba(20,40,60,0.05), 0 10px 30px rgba(20,40,60,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#10161b; --card:#1a232a; --ink:#e8eef1; --muted:#94a3ad; --line:#2a353d; --soft:#222d34;
      --accent-soft: rgba(0,179,215,0.20);
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 10px 30px rgba(0,0,0,0.45);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; line-height: 1.45; padding: 22px 16px 44px; }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-size: clamp(1.5rem, 5vw, 1.85rem); font-weight: 700; letter-spacing: -0.02em; }
  button { font-family: var(--font); cursor: pointer; }

  /* START */
  #start { margin-top: 8px; }
  .gamecard { background: var(--card); border-radius: 18px; box-shadow: var(--shadow); padding: 18px 18px 18px; margin-top: 16px; }
  .gc-head { font-size: 1.12rem; font-weight: 700; letter-spacing: -0.01em; }
  .gc-sub { font-size: 0.88rem; color: var(--muted); margin-top: 3px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip { border: 1px solid var(--line); background: var(--card); color: var(--ink); border-radius: 999px; padding: 8px 14px; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .chip .n { color: var(--muted); font-weight: 500; font-size: 0.78rem; margin-left: 5px; }
  .chip.active { background: var(--accent-soft); color: var(--accentd); border-color: rgba(0,179,215,0.45); }
  .chip.active .n { color: var(--accentd); opacity: 0.7; }
  .statrow { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .stat { font-size: 0.92rem; color: var(--muted); }
  .stat b { color: var(--ink); }
  .resetlink { background: none; border: none; color: var(--muted); font-size: 0.84rem; font-weight: 600; text-decoration: underline; padding: 4px 0; }
  .primary { width: 100%; margin-top: 16px; background: var(--accent); color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 1.06rem; font-weight: 700; }
  .primary:active { background: var(--accentd); }
  .levelrow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; width: 100%; padding: 12px 16px; background: var(--soft); border-radius: 14px; box-sizing: border-box; }
  .animal-emoji { font-size: 1.5rem; line-height: 1; }
  .animal-name { font-weight: 700; color: var(--ink); font-size: 0.98rem; }
  .animal-next { margin-left: auto; flex: 0 1 auto; min-width: 0; width: max-content; max-width: 100%; color: var(--muted); font-weight: 600; font-size: 0.82rem; text-align: left; }
  .barright { display: flex; align-items: center; gap: 12px; }
  .streak, .homestreak { align-items: center; font-weight: 700; color: var(--midd); font-size: 0.9rem; background: rgba(224,146,46,0.16); padding: 5px 11px; border-radius: 999px; white-space: nowrap; flex: 0 0 auto; }
  .streak { display: none; }
  .homestreak { display: inline-flex; }
  .done-badge { color: var(--ok); font-weight: 700; margin-left: 4px; }
  .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--card); color: var(--ink); border: 1px solid var(--line); box-shadow: var(--shadow); padding: 10px 18px; border-radius: 999px; font-weight: 700; font-size: 0.95rem; opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; z-index: 250; max-width: 88%; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  button { cursor: pointer; }
  @media (hover: hover) {
    .chip:hover { border-color: var(--accent); }
    .resetlink:hover { color: var(--ink); }
    .primary:hover { background: var(--accentd); }
    .secondary:hover { background: var(--accent-soft); }
    .sortbtn:hover { color: var(--ink); }
    .copybtn:hover { background: var(--line); color: var(--ink); }
    .item .go:hover { text-decoration: underline; }
    .back:hover { background: var(--soft); }
    .frontbtns .b-yes:hover { background: var(--okd); }
    .frontbtns .b-no:hover { background: var(--nod); }
    .frontbtns .b-reveal:hover { background: var(--line); }
    .frontbtns .b-go:hover { background: var(--accentd); }
    .see:hover { background: var(--line); }
    .next:hover { background: var(--accentd); }
    .btn-ghost:hover { filter: brightness(0.97); }
    .btn-danger:hover { background: var(--nod); }
  }
  .searchwrap { margin-top: 24px; }
  .listlabel { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); }
  .searchbox { position: relative; margin-top: 10px; }
  .search { width: 100%; border: none; border-radius: 12px; padding: 13px 44px 13px 42px; font-size: 1rem; font-family: var(--font); background: var(--soft); color: var(--ink); outline: none; }
  .search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); border: none; background: transparent; color: var(--muted); width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .search-clear.show { display: flex; }
  @media (hover:hover) { .search-clear:hover { background: var(--line); color: var(--ink); } }
  .search::placeholder { color: var(--muted); }
  .search:focus { box-shadow: 0 0 0 2px rgba(0,179,215,0.30); }
  .list { margin-top: 8px; }
  .item { display: flex; align-items: center; gap: 11px; padding: 12px 4px; border-bottom: 1px solid var(--line); }
  .secondary { width: 100%; margin-top: 10px; background: var(--soft); color: var(--ink); border: none; border-radius: 14px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .secondary:active { background: var(--line); }
  .sortrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .sortlbl { font-size: 0.74rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-right: 2px; }
  .sortbtn { background: var(--soft); border: none; color: var(--muted); border-radius: 999px; padding: 6px 12px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
  .sortbtn.active { background: var(--accent-soft); color: var(--accent); }
  .item .cnt { flex: 0 0 auto; font-size: 0.72rem; font-weight: 700; color: var(--muted); }
  .item .cnt.hard { color: var(--no); }
  .item .dot { flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
  .item .dot.s-done { background: var(--ok); }
  .item .dot.s-no { background: var(--no); }
  .item .dot.s-mid { background: var(--mid); }
  .item .tg { flex: 0 0 auto; text-align: center; background: var(--soft); color: var(--muted); border-radius: 6px; padding: 3px 7px; font-size: 0.68rem; font-weight: 700; white-space: nowrap; }
  .tgn { margin-left: 2px; }
  .backtop .tg { display: inline-block; background: var(--soft); color: var(--muted); border-radius: 6px; padding: 3px 8px; font-size: 0.7rem; font-weight: 700; margin-bottom: 8px; }
  .item .w { flex: 1; min-width: 0; font-size: 0.98rem; word-break: break-word; }
  .item .w .v { color: var(--ok); font-size: 0.72rem; font-weight: 700; margin-left: 6px; }
  .item .go { flex: 0 0 auto; text-decoration: none; color: var(--accent); font-size: 0.84rem; font-weight: 650; }

  /* STUDY */
  #study { display: none; max-width: 560px; margin: 0 auto; }
  .bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 14px; }
  .back { display: inline-flex; align-items: center; justify-content: center; background: none; border: none; color: var(--ink); padding: 6px; margin-left: -6px; border-radius: 8px; }
  .back:active { background: var(--soft); }
  #progress { font-size: 1rem; font-weight: 700; color: var(--ink); }
  .track { height: 7px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .fill { height: 100%; width: 0%; background: var(--ok); transition: width 0.35s, background 0.35s; }

  .flip { perspective: 1400px; }
  .card3d { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); padding: 26px 22px; min-height: 264px; display: flex; flex-direction: column; transform-style: preserve-3d; transition: transform 0.24s ease; will-change: transform; }

  .prompt { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
  .prompt .word { font-size: clamp(1.6rem, 6vw, 2.1rem); font-weight: 700; line-height: 1.18; letter-spacing: -0.02em; word-break: break-word; }
  .frontbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
  .frontbtns button { border: none; border-radius: 13px; padding: 15px; font-size: 1rem; font-weight: 700; color: #fff; }
  .b-yes { background: var(--ok); } .b-yes:active { background: var(--okd); }
  .b-no { background: var(--no); } .b-no:active { background: var(--nod); }
  .frontbtns .b-go { background: var(--accent); }
  .frontbtns .b-go:active { background: var(--accentd); }
  .frontbtns .b-reveal { background: var(--soft); color: var(--ink); }
  .frontbtns .b-reveal:active { background: var(--line); }
  .backactions .frontbtns { margin-top: 0; }

  .eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
  .bword { font-size: clamp(1.35rem, 5vw, 1.7rem); font-weight: 700; letter-spacing: -0.02em; word-break: break-word; }
  .bword-row { display: flex; align-items: center; gap: 8px; margin: 4px 0 16px; }
  .copybtn { flex: 0 0 auto; background: var(--soft); border: none; color: var(--muted); border-radius: 8px; padding: 6px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .copybtn:active { background: var(--line); }
  .copybtn.done { color: var(--ok); }
  .see { display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; background: var(--soft); color: var(--ink); border: none; border-radius: 12px; padding: 13px 18px; font-size: 0.98rem; font-weight: 650; }
  .see:active { background: var(--line); }
  .vid video { width: 100%; aspect-ratio: 4 / 3; border-radius: 13px; background: #000; display: block; }
  .next { width: 100%; margin-top: 14px; background: var(--accent); color: #fff; border: none; border-radius: 13px; padding: 15px; font-size: 1.02rem; font-weight: 700; }
  .next:active { background: var(--accentd); }
  .backtop { flex: 1; min-height: 0; }
  .backactions { display: flex; flex-direction: column; gap: 10px; }
  .backactions .next { margin-top: 0; }

  /* DONE */
  #done { display: none; }
  #done .donewrap { text-align: center; margin: 64px auto 0; max-width: 560px; }
  #done .bigicon { font-size: 5.5rem; line-height: 1; margin-bottom: 16px; }
  #done .big { font-size: 1.6rem; font-weight: 700; }
  #done .doneactions { display: flex; flex-direction: column; align-items: stretch; gap: 12px; margin: 26px auto 0; width: 320px; max-width: 100%; }
  #doneHome { width: 100%; display: block; padding: 15px 24px; margin-top: 0; font-size: 1.04rem; }
  .donerepeat { width: 100%; display: block; padding: 15px 24px; background: var(--soft); color: var(--ink); border: none; border-radius: 14px; font-size: 1.04rem; font-weight: 700; font-family: var(--font); cursor: pointer; }
  @media (hover:hover) { .donerepeat:hover { background: var(--line); } }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(21,33,43,0.45); display: none; align-items: center; justify-content: center; padding: 22px; z-index: 50; }
  .overlay.show { display: flex; }
  #repeatOverlay { z-index: 300; }
  .modal { background: var(--card); border-radius: 20px; padding: 24px; max-width: 360px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,0.28); }
  .modal .mt { font-size: 1.18rem; font-weight: 700; }
  .modal .mx { color: var(--muted); font-size: 0.92rem; margin-top: 9px; line-height: 1.5; }
  .modal .ma { display: flex; gap: 10px; margin-top: 22px; }
  .modal .ma button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 0.96rem; font-weight: 700; font-family: var(--font); }
  .btn-ghost { background: var(--soft); color: var(--ink); }
  .btn-danger { background: var(--no); color: #fff; }
  .btn-danger:active { background: var(--nod); }

  .splash { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 34px; z-index: 100; transition: opacity 0.45s ease; }
  .splash.hide { opacity: 0; pointer-events: none; }
  body.loading { overflow: hidden; }
  body.loading .wrap { visibility: hidden; }
  .splash .q { max-width: 640px; text-align: center; font-size: clamp(2.2rem, 8.5vw, 3.4rem); font-weight: 700; line-height: 1.22; letter-spacing: -0.02em; color: var(--ink); animation: qin 0.55s ease both; }
  @keyframes qin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .card3d { transition: none; } .splash .q { animation: none; } }
</style>
</head>
<body class="loading">
<div class="splash" id="splash"><div class="q" id="splashQ"></div></div>
<div class="wrap">
  <div class="toast" id="toast"></div>
  <h1 id="homeTitle">Znakuj i ti A1</h1>

  <!-- START -->
  <section id="start">
    <div class="chips" id="scopeChips"></div>
    <div class="gamecard">
      <div class="levelrow" id="levelStat"></div>
      <div class="statrow">
        <span class="stat" id="startStat"></span>
        <button class="resetlink" id="reset">Resetiraj napredak</button>
      </div>
      <button class="primary" id="begin">Vježbaj</button>
    </div>

    <div class="searchwrap">
      <div class="searchbox">
        <svg class="search-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="search" id="search" type="text" placeholder="Traži riječ" autocomplete="off">
        <button class="search-clear" id="searchClear" type="button" aria-label="Obriši">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="list" id="list"></div>
    </div>
  </section>

  <!-- STUDY -->
  <section id="study">
    <div class="bar">
      <button class="back" id="stop" aria-label="Natrag">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="barright"><span class="streak" id="streak"></span><span id="progress"></span></div>
    </div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="flip"><div class="card3d" id="card"></div></div>
  </section>

  <!-- DONE -->
  <section id="done">
    <div class="bar">
      <button class="back" id="doneBack" aria-label="Natrag">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <div class="donewrap">
      <div class="bigicon">🎉</div>
      <div class="big">Sve znaš!</div>
      <div class="doneactions">
        <button class="primary" id="doneHome">Povratak na početnu stranicu</button>
        <button class="donerepeat" id="doneRepeat" type="button">Ponovi temu</button>
      </div>
    </div>
  </section>
</div>

<!-- RESET MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mt">Resetirati napredak?</div>
    <div class="mx">Sve riječi označene kao naučene bit će obrisane. Ovo se ne može poništiti.</div>
    <div class="ma">
      <button class="btn-ghost" id="mCancel">Odustani</button>
      <button class="btn-danger" id="mConfirm">Resetiraj</button>
    </div>
  </div>
</div>

<div class="overlay" id="repeatOverlay">
  <div class="modal">
    <div class="mt">Ponoviti temu?</div>
    <div class="mx">Napredak za ovu temu bit će obrisan i kreće se ispočetka.</div>
    <div class="ma">
      <button class="btn-ghost" id="repeatCancel">Odustani</button>
      <button class="btn-danger" id="repeatConfirm">Ponovi</button>
    </div>
  </div>
</div>

function tag(t){ return (typeof t === "number") ? 'T<span class="tgn">'+t+'</span>' : t; }
function eyebrowText(t){ return (typeof t === "number") ? "Tema "+t : t; }
function queryFor(w){
  if (overrides[w]) return overrides[w];
  let q = w.replace(/,\s*[ab]\.?$/i,"").replace(/\([^)]*\)/g,"").replace(/[!?.]+$/g,"").trim();
  const keepJezik = ["jezik","znakovni jezik","hrvatski znakovni jezik","strani jezik"];
  if (/\sjezik$/i.test(q) && !keepJezik.includes(q.toLowerCase())) q = q.replace(/\s+jezik$/i,"").trim();
  return q;
}
function urlFor(w){ return "https://www.spreadthesign.com/hr.hr/search/?q=" + encodeURIComponent(queryFor(w)); }
function posterFor(u){ return u.replace("/video/mp4/","/video/jpg/").replace(/\.mp4$/i,".jpg"); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function norm(s){ return s.toLowerCase().replace(/đ/g,"d").normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

async function copyText(text, btn){
  try { await navigator.clipboard.writeText(text); }
  catch(e){
    const t = document.createElement("textarea"); t.value = text;
    t.style.position = "fixed"; t.style.opacity = "0"; document.body.appendChild(t);
    t.select(); try { document.execCommand("copy"); } catch(_){}
    document.body.removeChild(t);
  }

  setTimeout(() => { btn.classList.remove("done"); btn.innerHTML = copySvg; }, 1200);

};

function load(){
  try { const r = store.get("sts_mastered"); if (r) JSON.parse(r).forEach(k=>mastered.add(k)); } catch(e){}
  try { const r = store.get("sts_misses"); if (r) misses = JSON.parse(r)||{}; } catch(e){}
  recalcMax();
  try { const r = store.get("sts_videos"); if (r) videos = JSON.parse(r)||{}; } catch(e){}

function recalcMax(){ let m=0; for (const k in misses){ if (misses[k]>m) m=misses[k]; } maxMissCache=m; }
function saveMisses(){ store.set("sts_misses", JSON.stringify(misses)); recalcMax(); }
function hardThreshold(){ return Math.max(1, Math.ceil(maxMissCache/3)); }
function isHard(k){ return maxMissCache >= 1 && (misses[k]||0) >= hardThreshold(); }
function effectiveSort(){ return maxMissCache > 0 ? "hard" : "alpha"; }
function heat(t){
  const stops = [[245,201,53],[241,160,44],[232,116,46],[222,60,60]];
  const x = Math.max(0, Math.min(1, t)) * (stops.length - 1);
  const i = Math.min(Math.floor(x), stops.length - 2);
  const f = x - i;
  const c = stops[i].map((v,k)=>Math.round(v + (stops[i+1][k]-v)*f));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function statusRank(c){
  const m = misses[c.key]||0;
  if (m>0 && !mastered.has(c.key)) return 0;
  if (mastered.has(c.key)) return 1;
  return 2;
}

function buildChips(){
  scopeChips.innerHTML = "";

  all.className = "chip" + (selected.size===0 && !hardOnly ? " active":"");
  all.innerHTML = `Sve teme <span class="n">${cards.length}</span>`;

  themes.forEach(t => {
    const c = document.createElement("div");
    c.className = "chip" + (!hardOnly && selected.has(t.n) ? " active":"");
    const themeCards = cards.filter(x=>x.theme===t.n);
    const complete = themeCards.length>0 && themeCards.every(x=>mastered.has(x.key));
    c.innerHTML = `${tag(t.n)} <span class="n">${themeCards.length}</span>${complete ? ' <span class="done-badge">✓</span>' : ''}`;
    c.onclick = () => {
      hardOnly = false;
      if (selected.has(t.n)) selected.delete(t.n); else selected.add(t.n);
      buildChips(); updateStartStat(); renderList(); saveSession("start");
    };
    scopeChips.appendChild(c);
  });
  const hardN = cards.filter(c => isHard(c.key)).length;
  if (hardN > 0){

  } else { hardOnly = false; }
}
function updateStartStat(){
  const ai = currentAnimal(), a = ANIMALS[ai], na = ANIMALS[ai+1];
  const nextTxt = na ? `Još ${rijeciTxt(na.t - mastered.size)} do sljedeće razine` : "Najjača životinja!";
  const fire = bestStreak >= 2 ? `<span class="homestreak">🔥 ${bestStreak}</span>` : "";
  document.getElementById("levelStat").innerHTML = `<span class="animal-emoji">${a.e}</span><span class="animal-name">${a.n}</span>${fire}<span class="animal-next">${balanceTwoLines(nextTxt)}</span>`;
  document.getElementById("reset").style.visibility = hardOnly ? "hidden" : "visible";
  if (hardOnly){
    const n = cards.filter(c => isHard(c.key)).length;
    startStat.innerHTML = `<b>${n}</b> ${n===1 ? "riječ" : "riječi"}`;
    return;
  }
  const pool = cards.filter(inScope);
  const done = pool.filter(c=>mastered.has(c.key)).length;
  startStat.innerHTML = `Naučeno <b>${done}</b> / ${pool.length} riječi`;
}
// search list always covers ALL themes (independent of selected)
function renderList(){
  const q = norm(searchEl.value.trim());
  const searching = q.length > 0;
  const useHard = hardOnly && !searching;
  let rows = searching
    ? cards.filter(c => norm(c.word).includes(q))
    : cards.filter(c => inScope(c) && (!hardOnly || isHard(c.key)));
  let hmin = Infinity, hmax = 0;
  if (useHard){
    for (const c of cards){ if (isHard(c.key)){ const v = misses[c.key]||0; if (v<hmin) hmin=v; if (v>hmax) hmax=v; } }
  }
  if (useHard){
    rows = rows.slice().sort((a,b) => (misses[b.key]||0)-(misses[a.key]||0) || collator.compare(a.word,b.word));
  } else {
    rows = rows.slice().sort((a,b) => {
      const ra = statusRank(a), rb = statusRank(b);
      if (ra !== rb) return ra - rb;
      return collator.compare(a.word, b.word);
    });
  }
  const showTag = searching ? true : (selected.size !== 1);
  listEl.innerHTML = rows.map(c => {
    const m = misses[c.key]||0;
    let dotClass = "", dotStyle = "", lbl;
    if (useHard){
      let t = (hmax > hmin) ? (m - hmin) / (hmax - hmin) : 1;
      t = Math.max(0, Math.min(1, t));
      dotStyle = ` style="background:${heat(t)}"`;
      lbl = `Promašeno ${m}×`;
    } else if (mastered.has(c.key)){
      dotClass = "s-done"; lbl = "Znam";
    } else if (m > 0){
      dotClass = "s-no"; lbl = `Ne znam (promašeno ${m}×)`;
    } else {
      lbl = "Još nije vježbano";
    }
    return `
    <div class="item">
      <span class="dot ${dotClass}"${dotStyle} title="${lbl}"></span>
      ${showTag ? `<span class="tg">${tag(c.theme)}</span>` : ""}
      <span class="w">${esc(c.word)}${videos[c.key] ? '<span class="v">▶</span>' : ''}</span>
      <button class="copybtn" data-copy="${esc(c.word)}" aria-label="Kopiraj riječ" title="Kopiraj riječ">${copySvg}</button>
      <a class="go" href="${urlFor(c.word)}" target="_blank" rel="noopener">Vidi znak ↗</a>
    </div>`;
  }).join("");
}

    ? cards.filter(c => inScope(c) && isHard(c.key))

function currentAnimal(){ const m = mastered.size; let i = 0; for (let k=0;k<ANIMALS.length;k++){ if (m >= ANIMALS[k].t) i = k; } return i; }
function balanceTwoLines(text){
  const words = text.split(" ");
  if (words.length < 4) return text;
  let best = 1, bestDiff = Infinity;
  for (let i = 1; i < words.length; i++){
    const a = words.slice(0,i).join(" ").length;
    const b = words.slice(i).join(" ").length;
    const d = Math.abs(a-b);
    if (d < bestDiff){ bestDiff = d; best = i; }
  }
  return words.slice(0,best).join(" ") + "<br>" + words.slice(best).join(" ");
}
function rijeciTxt(n){
  const a = n % 10, b = n % 100;
  if (b >= 11 && b <= 14) return `${n} naučenih riječi`;
  if (a === 1) return `${n} naučena riječ`;
  if (a >= 2 && a <= 4) return `${n} naučene riječi`;
  return `${n} naučenih riječi`;
}
function showToast(msg){
  const el = document.getElementById("toast");

function progressDoneTotal(){
  if (hardOnly){
    const remaining = new Set(queue).size;
    const total = sessionTotal || remaining || 1;
    return [Math.max(0, total - remaining), total];
  }
  const done = cards.filter(c=>inScope(c)&&mastered.has(c.key)).length;
  const total = cards.filter(inScope).length;
  return [done, total];
}
function seedMilestones(){
  milestonesFired = new Set();
  if (hardOnly) return;
  const [done, total] = progressDoneTotal();
  const frac = total ? done/total : 0;
  for (const thr of [0.25,0.5,0.75]) if (frac >= thr) milestonesFired.add(thr);
}
function checkMilestone(){
  const [done, total] = progressDoneTotal();
  if (!total) return;
  const frac = done/total;
  const marks = [[0.75,"75%! Skoro pa gotovo 🎉"],[0.5,"Pola puta! Samo tako nastavi 🎉"],[0.25,"Već 25%! Ide super 🎉"]];
  for (const [thr, msg] of marks){
    if (frac >= thr && !milestonesFired.has(thr)){ milestonesFired.add(thr); showToast(msg); break; }
  }
}
function progColor(frac){
  const stops = [[0,[224,85,111]],[0.5,[224,146,46]],[1,[31,169,127]]];
  let a = stops[0], b = stops[stops.length-1];
  for (let i=0;i<stops.length-1;i++){ if (frac>=stops[i][0] && frac<=stops[i+1][0]){ a=stops[i]; b=stops[i+1]; break; } }
  const span = b[0]-a[0], t = span ? (frac-a[0])/span : 0;
  const c = a[1].map((v,i)=> Math.round(v + (b[1][i]-v)*t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function updateProgress(){
  const [done, total] = progressDoneTotal();
  progressEl.textContent = `${done} / ${total}`;
  const frac = total ? done/total : 0;
  fillEl.style.width = Math.round(frac*100) + "%";
  fillEl.style.background = progColor(frac);
}

function renderFront(c){
  card.innerHTML = `
    <div class="prompt"><div class="word">${esc(c.word)}</div></div>
    <div class="frontbtns">
      <button class="b-reveal" id="fReveal">Pokaži odgovor</button>
      <button class="b-go" id="fYes">Dalje</button>
    </div>`;
  document.getElementById("fYes").onclick = handleYes;
  document.getElementById("fReveal").onclick = handleReveal;
}
function renderBack(c){
  const saved = videos[c.key];
  const videoBlock = saved
    ? `<div class="vid"><video src="${saved}" poster="${posterFor(saved)}" autoplay loop muted playsinline controls></video></div>`
    : "";
  const seeBlock = saved
    ? ""
    : `<a class="see" href="${urlFor(c.word)}" target="_blank" rel="noopener">Vidi znak ↗</a>`;
  card.innerHTML = `
    <div class="backtop">
      <span class="tg">${tag(c.theme)}</span>
      <div class="bword-row">
        <span class="bword">${esc(c.word)}</span>
        <button class="copybtn" id="copyBtn" aria-label="Kopiraj riječ" title="Kopiraj riječ">${copySvg}</button>
      </div>
      ${videoBlock}
    </div>
    <div class="backactions">
      ${seeBlock}
      <button class="next" id="nextBtn">Dalje</button>
    </div>`;
  document.getElementById("nextBtn").onclick = handleNext;
  const cb = document.getElementById("copyBtn");
  cb.onclick = () => copyText(c.word, cb);
}

function flipSwap(renderFn){
  if (REDUCE){ renderFn(); return; }
  if (flipping) return;
  flipping = true;
  card.style.transform = "rotateY(90deg)";
  setTimeout(() => {
    renderFn();
    card.style.transition = "none";
    card.style.transform = "rotateY(-90deg)";
    void card.offsetWidth;
    card.style.transition = "transform 0.24s ease";
    requestAnimationFrame(() => { card.style.transform = "rotateY(0deg)"; });
    setTimeout(() => { flipping = false; }, 260);
  }, 230);
}

// slide animation when moving to the next card
function slideNext(renderFn){
  if (REDUCE){ renderFn(); return; }
  if (flipping) return;
  flipping = true;
  card.style.transition = "transform 0.2s ease, opacity 0.2s ease";
  card.style.transform = "translateX(-42px)";
  card.style.opacity = "0";
  setTimeout(() => {
    renderFn();
    card.style.transition = "none";
    card.style.transform = "translateX(42px)";
    void card.offsetWidth;
    card.style.transition = "transform 0.24s ease, opacity 0.24s ease";
    requestAnimationFrame(() => { card.style.transform = "translateX(0)"; card.style.opacity = "1"; });
    setTimeout(() => { flipping = false; }, 260);
  }, 200);
}

// Znam: ne okreće, samo dolazi sljedeća kartica
function handleYes(){
  const key = queue.shift();
  const wasNew = !mastered.has(key);
  const oldAnimal = currentAnimal();
  mastered.add(key); saveMastered();
  streak++; updateStreak();
  if (streak > bestStreak){ bestStreak = streak; saveBestStreak(); }
  const newAnimal = currentAnimal();
  if (queue.length === 0){ showDone(false, true); return; }
  updateProgress();
  if (wasNew && newAnimal > oldAnimal) showToast(`Sad si ${ANIMALS[newAnimal].n}! ${ANIMALS[newAnimal].e}`);
  else checkMilestone();
  saveSession("study");
  slideNext(() => renderFront(cardByKey(queue[0])));
}
// Pokaži odgovor: okreni karticu (bez bilježenja promašaja)
function handleReveal(){ streak = 0; updateStreak(); flipSwap(() => renderBack(cardByKey(queue[0]))); }
// Dalje (nakon prikaza odgovora): zabilježi promašaj, vrati riječ kasnije i idi dalje
function handleNext(){
  const key = queue.shift();
  misses[key] = (misses[key]||0) + 1; saveMisses();
  const n = queue.length;
  const seen = (k) => k && (misses[k]||0) > 0;
  const lo = Math.min(Math.max(8, Math.floor(n*0.4)), n);
  const near = (pos) => { let c=0; for (let d=-2; d<=2; d++){ if (seen(queue[pos+d])) c++; } return c; };
  let best = randIn(lo, n), bestScore = near(best);
  for (let t=0; t<16 && bestScore>0; t++){
    const cand = randIn(lo, n);
    const s = near(cand);
    if (s < bestScore){ bestScore = s; best = cand; }
  }
  queue.splice(best, 0, key);
  updateProgress();
  saveSession("study");
  slideNext(() => renderFront(cardByKey(queue[0])));
}


let confettiCanvas = null;
function stopConfetti(){ if (confettiCanvas){ confettiCanvas.remove(); confettiCanvas = null; } }
function confetti(){
  stopConfetti();
  const c = document.createElement("canvas");
  c.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:200;";
  document.body.appendChild(c);
  confettiCanvas = c;
  const ctx = c.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const resize = () => { c.width = innerWidth*dpr; c.height = innerHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); };
  resize(); window.addEventListener("resize", resize);
  const colors = ["#00b3d7","#1fa97f","#e0922e","#e0556f","#f2c037","#7c5cff"];
  const mk = (init) => ({ x: Math.random()*innerWidth,
    y: init ? (Math.random()*innerHeight*2 - innerHeight) : (-20 - Math.random()*innerHeight),
    w: 6+Math.random()*6, h: 8+Math.random()*8, vy: 3.2+Math.random()*2.8, vx: -1.5+Math.random()*3,
    rot: Math.random()*Math.PI, vr: -0.3+Math.random()*0.6, color: colors[Math.floor(Math.random()*colors.length)] });
  const parts = [];
  for (let i=0;i<260;i++) parts.push(mk(true));
  function frame(){
    if (confettiCanvas !== c){ window.removeEventListener("resize", resize); return; }
    ctx.clearRect(0,0,innerWidth,innerHeight);
    for (const p of parts){
      p.x += p.vx; p.y += p.vy; p.vy += 0.03; if (p.vy > 6.5) p.vy = 6.5; p.rot += p.vr;
      if (p.y > innerHeight + 30) Object.assign(p, mk(false));
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function showDone(already, celebrate){
  studyEl.style.display="none"; startEl.style.display="none"; doneEl.style.display="block"; homeTitle.style.display="none";
  saveSession("done");
  document.getElementById("doneRepeat").style.display = (selected.size === 1) ? "inline-block" : "none";
  if (celebrate && !REDUCE) confetti();
}

function restore(){
  let s = null;
  try { const r = store.get("sts_session"); if (r) s = JSON.parse(r); } catch(e){}
  if (s && Array.isArray(s.s)) selected = new Set(s.s);
  hardOnly = !!(s && s.h);
  buildChips(); updateStartStat(); renderList();
  if (s && s.v === "study") {
    const pool = hardOnly
      ? cards.filter(c => inScope(c) && isHard(c.key))
      : cards.filter(c => inScope(c) && !mastered.has(c.key));
    if (pool.length) {
      sessionTotal = pool.length;
      streak = 0; seedMilestones(); updateStreak();
      queue = shuffle(pool.map(c=>c.key));
      startEl.style.display="none"; doneEl.style.display="none"; studyEl.style.display="block"; homeTitle.style.display="none";
      card.style.transform = "";
      updateProgress();
      renderFront(cardByKey(queue[0]));
      return;
    }
  }
  if (s && s.v === "done") { showDone(false, !!s.dc); }
}
